- name: add ssh key for elliot
  authorized_key:
    user: elliot
    key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHMsJNIoii6tTWlC+97i7fZF3asV6cCYLR5RTiBGYxCw default"

- name: generate sshd_config file from template
  tags: ssh
  template:
    src: "{{ ssh_template_file }}"
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: 0644
  notify: restart_sshd
